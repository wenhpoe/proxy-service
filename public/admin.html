<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>设备管理 · 代理服务</title>
    <link rel="stylesheet" href="/app.css" />
    <script src="/nav.js" defer></script>
    <script src="/pager.js" defer></script>
    <script src="/time.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <header class="topbar">
        <div class="brand">
          <h1>设备管理（代理服务）</h1>
          <div class="sub">
            生成激活码、绑定机器码、分配账号。账号登录保存/上传更新请到“账号仓库”页面。
          </div>
        </div>
        <div class="top-actions">
          <button class="btn" id="btnRefresh">刷新</button>
          <button class="btn" id="btnLogout">退出</button>
          <div class="pill" title="服务状态">
            <span class="led" id="led"></span>
            <span class="mono" id="pillText">检查中…</span>
          </div>
        </div>
      </header>

      <nav class="nav" aria-label="导航" data-nav></nav>

      <main class="grid single">
        <section class="card">
          <div class="card-h">
            <h2>机器码分配</h2>
            <div class="row">
              <button class="btn" id="btnListMachines">刷新</button>
            </div>
          </div>
          <div class="card-b">
            <div class="toolbar">
              <div class="sub">
                机器列表只显示已激活的机器（已发放令牌）。点击机器码或“分配账号”可打开弹窗，用勾选方式分配账号。
                <span class="mono">lastSeenAt</span> 会在客户端请求接口时更新。
              </div>
              <div class="row" style="justify-content: flex-end">
                <input class="input" id="machSearch" placeholder="搜索机器码…" style="width: 220px" />
                <select id="machPageSize" style="width: 110px"></select>
                <button class="btn" id="machPrev">上一页</button>
                <button class="btn" id="machNext">下一页</button>
                <span class="chip"><span class="mono" id="machInfo">—</span></span>
              </div>
            </div>

            <div class="status" id="statusMach" hidden></div>

            <div style="height: 10px"></div>
            <div class="tablebox" style="max-height: 62vh">
              <table>
                <thead>
                  <tr>
                    <th>机器码</th>
                    <th style="width: 180px">激活时间</th>
                    <th style="width: 180px">最后同步</th>
                    <th style="width: 110px">账号数</th>
                    <th style="width: 240px">操作</th>
                  </tr>
                </thead>
                <tbody id="machinesTbody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal" id="assignModal" hidden>
      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="assignTitle"
      >
        <div class="modal-h">
          <h2 id="assignTitle">
            分配账号 · <span class="mono" id="assignMachineId">—</span>
          </h2>
          <div class="row">
            <button class="btn" id="btnCloseModal">关闭</button>
          </div>
        </div>
        <div class="modal-b">
          <div class="split">
            <div>
              <label class="sub">搜索账号</label>
              <div style="height: 6px"></div>
              <input class="input" id="accSearch" placeholder="输入账号关键字…" />
              <div style="height: 10px"></div>
              <div class="row">
                <button class="btn" id="btnSelAll">全选</button>
                <button class="btn" id="btnSelNone">清空</button>
                <button class="btn" id="btnSelOnly" aria-pressed="false">仅已选</button>
              </div>
              <div style="height: 10px"></div>
              <div class="pager" style="justify-content: flex-start">
                <select id="accPageSize" style="width: 110px"></select>
                <button class="btn" id="accPrev">上一页</button>
                <button class="btn" id="accNext">下一页</button>
                <span class="chip"><span class="mono" id="accInfo">—</span></span>
              </div>
              <div style="height: 10px"></div>
              <div class="tablebox" style="max-height: 48vh">
                <table>
                  <thead>
                    <tr>
                      <th style="width: 64px">选择</th>
                      <th>账号</th>
                    </tr>
                  </thead>
                  <tbody id="accCheckTbody"></tbody>
                </table>
              </div>
            </div>
            <div>
              <div class="hint">
                勾选后点击“保存分配”。保存会覆盖该机器之前的分配列表（客户端下次同步生效）。
              </div>
              <div style="height: 10px"></div>
              <div class="row">
                <span class="chip"><span class="mono">已选</span> <strong id="selCount">0</strong></span>
                <span class="chip"><span class="mono">总数</span> <strong id="accTotal">0</strong></span>
              </div>
              <div class="status" id="statusModal" hidden></div>
              <div style="height: 12px"></div>
              <div class="modal-actions">
                <button class="btn primary" id="btnSaveAssign">保存分配</button>
                <button class="btn" id="btnCancelAssign">取消</button>
              </div>
              <div class="meta">
                小提示：账号列表来自服务端 <span class="mono">accounts/</span> 目录。先上传/更新账号 JSON，再来分配会更顺手。
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const state = {
        machines: [],
        accounts: [],
        assignMachineId: null,
        selected: new Set(),
        onlySelected: false,
      };
      const resetArmed = new Set();

      let pagerMachines = null;
      let pagerModalAccounts = null;

      function setStatus(elId, kind, text) {
        const el = $(elId);
        if (!text) {
          el.hidden = true;
          el.className = "status";
          el.textContent = "";
          return;
        }
        el.hidden = false;
        el.className = `status ${kind || ""}`.trim();
        el.textContent = text;
      }

      async function j(url, opts) {
        const res = await fetch(url, opts);
        if (res.status === 401) {
          const next = encodeURIComponent(location.pathname + location.search);
          location.href = `/login.html?next=${next}`;
          throw new Error("未登录");
        }
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `请求失败（HTTP ${res.status}）`);
        return data;
      }

      async function refreshHealth() {
        try {
          await j("/health");
          $("led").className = "led good";
          $("pillText").textContent = "正常";
        } catch {
          $("led").className = "led bad";
          $("pillText").textContent = "离线";
        }
      }

      function esc(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function ts(s) {
        try {
          return window.fmaFmtChinaTime ? window.fmaFmtChinaTime(s) : String(s || "—");
        } catch {
          return String(s || "—");
        }
      }

      function renderMachines() {
        const q = String($("machSearch").value || "").trim().toLowerCase();
        const tbody = $("machinesTbody");
        tbody.innerHTML = "";

        const machines = Array.isArray(state.machines) ? state.machines : [];
        const filtered = q ? machines.filter((m) => String(m.machineId || "").toLowerCase().includes(q)) : machines;
        const pageItems = pagerMachines ? pagerMachines.slice(filtered) : filtered;

        if (!filtered.length) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="5" class="sub" style="padding:12px">暂无机器（或搜索无结果）。客户端激活后会出现在这里。</td>`;
          tbody.appendChild(tr);
          return;
        }

        for (const m of pageItems) {
          const allowed = Array.isArray(m.allowedProfiles) ? m.allowedProfiles : [];
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="mono">
              <a href="#" data-assign="${esc(m.machineId)}" title="分配账号">${esc(m.machineId)}</a>
            </td>
            <td class="mono">${esc(ts(m.activatedAt))}</td>
            <td class="mono">${esc(ts(m.lastSeenAt))}</td>
            <td class="mono">${allowed.length}</td>
            <td>
              <div class="row">
                <button class="btn sm primary" data-assign="${esc(m.machineId)}">分配账号</button>
                <button class="btn sm danger" data-reset="${esc(m.machineId)}">${
                  resetArmed.has(m.machineId) ? "确认重置" : "重置设备"
                }</button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        }
      }

      function openAssignModal(machineId) {
        const m = state.machines.find((x) => x.machineId === machineId);
        if (!m) return;
        state.assignMachineId = machineId;
        state.selected = new Set((m.allowedProfiles || []).map((x) => String(x).trim()).filter(Boolean));
        state.onlySelected = false;
        pagerModalAccounts?.reset();
        $("btnSelOnly").setAttribute("aria-pressed", "false");
        $("btnSelOnly").textContent = "仅已选";
        $("assignMachineId").textContent = machineId;
        $("accSearch").value = "";
        setStatus("statusModal", "", "");
        renderAccountChecks();
        $("assignModal").hidden = false;
      }

      function closeAssignModal() {
        $("assignModal").hidden = true;
        state.assignMachineId = null;
        state.selected = new Set();
        setStatus("statusModal", "", "");
      }

      function renderAccountChecks() {
        const tbody = $("accCheckTbody");
        tbody.innerHTML = "";
        const q = String($("accSearch").value || "").trim().toLowerCase();
        const onlySel = !!state.onlySelected;

        const accounts = Array.isArray(state.accounts) ? state.accounts : [];
        const total = accounts.length;
        $("accTotal").textContent = String(total);

        const filtered = accounts.filter((a) => {
          const name = String(a.name || "").trim();
          if (!name) return false;
          if (onlySel && !state.selected.has(name)) return false;
          if (q && !name.toLowerCase().includes(q)) return false;
          return true;
        });

        const pageItems = pagerModalAccounts ? pagerModalAccounts.slice(filtered) : filtered;

        $("selCount").textContent = String(state.selected.size);

        if (!filtered.length) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td colspan="2" class="sub" style="padding:12px">${
            onlySel ? "暂无已选账号（或搜索无结果）。" : "暂无账号（或搜索无结果）。"
          }</td>`;
          tbody.appendChild(tr);
          return;
        }

        for (const a of pageItems) {
          const name = String(a.name || "").trim();
          const id = `ck_${name.replaceAll(/[^a-zA-Z0-9_-]/g, "_")}`;
          const tr = document.createElement("tr");
          tr.setAttribute("data-prof-row", name);
          tr.innerHTML = `
            <td>
              <input class="check" type="checkbox" id="${esc(id)}" data-prof="${esc(name)}" ${
                state.selected.has(name) ? "checked" : ""
              } />
            </td>
            <td>
              <div class="stack">
                <div class="row" style="justify-content: space-between; gap: 10px">
                  <label class="mono" for="${esc(id)}" style="cursor:pointer; font-weight: 650">${esc(
                    name,
                  )}</label>
                  <span class="badge mono" title="更新时间">${esc(ts(a.updatedAt))}</span>
                </div>
                <div class="row" style="gap: 8px">
                  <span class="badge mono" title="大小">${esc(a.size || 0)}</span>
                  <span class="badge ${state.selected.has(name) ? "good" : ""}">${
                    state.selected.has(name) ? "已选" : "未选"
                  }</span>
                </div>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        }

        for (const ck of tbody.querySelectorAll('input[type="checkbox"][data-prof]')) {
          ck.addEventListener("change", (e) => {
            const prof = e.target.getAttribute("data-prof");
            if (!prof) return;
            if (e.target.checked) state.selected.add(prof);
            else state.selected.delete(prof);
            $("selCount").textContent = String(state.selected.size);
            if (state.onlySelected) renderAccountChecks();
          });
        }

      }

      async function listMachines() {
        const r = await j("/v1/admin/machines");
        state.machines = Array.isArray(r.machines) ? r.machines : [];
        state.accounts = Array.isArray(r.accounts) ? r.accounts : [];
        resetArmed.clear();
        pagerMachines?.reset();
        renderMachines();
        return r;
      }

      async function resetMachine(machineId) {
        const id = String(machineId || "").trim();
        if (!id) return;

        if (!resetArmed.has(id)) {
          resetArmed.add(id);
          setStatus("statusMach", "warn", `已准备重置：再次点击“重置设备”将重置 ${id}`);
          renderMachines();
          return;
        }

        try {
          setStatus("statusMach", "warn", `正在重置：${id}…`);
          await j(`/v1/admin/machines/${encodeURIComponent(id)}/reset`, { method: "POST" });
          setStatus("statusMach", "good", `已重置：${id}（客户端将回到激活状态）`);
          await listMachines();
        } catch (e) {
          setStatus("statusMach", "bad", e.message || "重置失败");
        } finally {
          resetArmed.delete(id);
          renderMachines();
        }
      }

      async function saveAssign() {
        const machineId = String(state.assignMachineId || "").trim();
        if (!machineId) return;
        const allowedProfiles = Array.from(state.selected.values()).sort((a, b) => a.localeCompare(b, "zh-CN"));
        try {
          setStatus("statusModal", "warn", "保存中…");
          await j(`/v1/admin/machines/${encodeURIComponent(machineId)}`, {
            method: "PUT",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ allowedProfiles }),
          });
          const m = state.machines.find((x) => x.machineId === machineId);
          if (m) m.allowedProfiles = allowedProfiles;
          renderMachines();
          setStatus("statusMach", "good", `已保存：${machineId}（${allowedProfiles.length} 个账号）`);
          closeAssignModal();
        } catch (e) {
          setStatus("statusModal", "bad", e.message || "保存失败");
        }
      }

      $("btnRefresh").addEventListener("click", async () => {
        try {
          await Promise.all([refreshHealth(), listMachines()]);
        } catch (e) {
          setStatus("statusMach", "bad", e.message || "刷新失败");
        }
      });
      $("btnListMachines").addEventListener("click", listMachines);
      $("machSearch").addEventListener("input", () => {
        pagerMachines?.reset();
        renderMachines();
      });

      $("machinesTbody").addEventListener("click", (e) => {
        const r = e.target.closest("[data-reset]");
        if (r) {
          e.preventDefault();
          return resetMachine(r.getAttribute("data-reset"));
        }
        const t = e.target.closest("[data-assign]");
        if (!t) return;
        e.preventDefault();
        const machineId = t.getAttribute("data-assign");
        if (!machineId) return;
        openAssignModal(machineId);
      });

      $("btnCloseModal").addEventListener("click", closeAssignModal);
      $("btnCancelAssign").addEventListener("click", closeAssignModal);
      $("assignModal").addEventListener("click", (e) => {
        if (e.target === $("assignModal")) closeAssignModal();
      });
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && !$("assignModal").hidden) closeAssignModal();
      });

      $("accSearch").addEventListener("input", () => {
        pagerModalAccounts?.reset();
        renderAccountChecks();
      });
      $("accCheckTbody").addEventListener("click", (e) => {
        const tr = e.target.closest("tr[data-prof-row]");
        if (!tr) return;
        if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "LABEL")) return;
        const ck = tr.querySelector('input[type="checkbox"][data-prof]');
        if (!ck) return;
        ck.checked = !ck.checked;
        ck.dispatchEvent(new Event("change", { bubbles: true }));
      });
      $("btnSelAll").addEventListener("click", () => {
        for (const a of state.accounts) {
          const name = String(a.name || "").trim();
          if (name) state.selected.add(name);
        }
        renderAccountChecks();
      });
      $("btnSelNone").addEventListener("click", () => {
        state.selected = new Set();
        renderAccountChecks();
      });
      $("btnSelOnly").addEventListener("click", () => {
        state.onlySelected = !state.onlySelected;
        $("btnSelOnly").setAttribute("aria-pressed", String(state.onlySelected));
        $("btnSelOnly").textContent = state.onlySelected ? "仅已选 ✓" : "仅已选";
        renderAccountChecks();
      });
      $("btnSaveAssign").addEventListener("click", saveAssign);
      $("btnLogout").addEventListener("click", async () => {
        try {
          await fetch("/auth/logout", { method: "POST" });
        } catch {
          // ignore
        } finally {
          const next = encodeURIComponent(location.pathname + location.search);
          location.href = `/login.html?next=${next}`;
        }
      });

      // Use pageshow to handle bfcache (back/forward) after logout / cookie changes.
      window.addEventListener("pageshow", async () => {
        try {
          pagerMachines?.reset();
          pagerModalAccounts?.reset();
          await Promise.all([refreshHealth(), listMachines()]);
        } catch (e) {
          setStatus("statusMach", "bad", e.message || "加载失败");
        }
      });

      window.addEventListener("DOMContentLoaded", () => {
        pagerMachines = window.createPager({
          sizeSel: $("machPageSize"),
          prevBtn: $("machPrev"),
          nextBtn: $("machNext"),
          infoEl: $("machInfo"),
          defaultPageSize: 15,
          sizes: [10, 15, 20],
          onChange: renderMachines,
        });
        pagerModalAccounts = window.createPager({
          sizeSel: $("accPageSize"),
          prevBtn: $("accPrev"),
          nextBtn: $("accNext"),
          infoEl: $("accInfo"),
          defaultPageSize: 15,
          sizes: [10, 15, 20],
          onChange: renderAccountChecks,
        });
      });
    </script>
  </body>
</html>
