name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      MAC_CSC_P12_BASE64: ${{ secrets.MAC_CSC_P12_BASE64 }}
      MAC_CSC_P12_PASSWORD: ${{ secrets.MAC_CSC_P12_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Verify tag matches version
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "❌ tag (${TAG}) != package.json version (${PKG_VERSION})"
            exit 1
          fi

      - name: Write .env (optional, for bundled admin password)
        shell: bash
        env:
          PROXY_ADMIN_PASSWORD: ${{ secrets.PROXY_ADMIN_PASSWORD }}
        run: |
          if [ -n "${PROXY_ADMIN_PASSWORD}" ]; then
            echo "PROXY_ADMIN_PASSWORD=${PROXY_ADMIN_PASSWORD}" > .env
            echo "✅ wrote .env for bundling"
          else
            echo "ℹ️ PROXY_ADMIN_PASSWORD not set; packaged app will auto-generate on first start"
          fi

      - name: Import macOS code signing certificate (optional)
        if: runner.os == 'macOS' && env.MAC_CSC_P12_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          echo "${MAC_CSC_P12_BASE64}" | base64 --decode > signing-cert.p12

          KEYCHAIN=build.keychain
          KEYCHAIN_PWD=""

          security create-keychain -p "${KEYCHAIN_PWD}" "${KEYCHAIN}"
          security set-keychain-settings -t 3600 -u "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PWD}" "${KEYCHAIN}"
          security list-keychains -d user -s "${KEYCHAIN}"
          security default-keychain -s "${KEYCHAIN}"

          security import signing-cert.p12 -k "${KEYCHAIN}" -P "${MAC_CSC_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PWD}" "${KEYCHAIN}"

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
